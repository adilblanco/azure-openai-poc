# ================================================================
#  PROJECT CONFIG — azure-openai-poc
#
# Projet de validation de documents de candidature (CV et lettre
# de motivation) par classification Azure OpenAI.
#
# Ce fichier définit l'ensemble des paramètres dynamiques du projet :
#   • backend et pipeline de prédiction
#   • configuration du modèle Azure OpenAI
#   • métadonnées du projet
#
# Paramétrisation complète : pas de hardcode dans le code
# ================================================================

# Environnement
env_hosts:
  local:
    ENV: "local"
    DEBUG: true

# Backend — Azure OpenAI
backend:
  type: "azure_openai_llm"
  model: "gpt-5-mini"
  temperature: 0 
  timeout: 60
  reasoning_effort: low
  params:
    max_tokens: 4000

# Pipeline — Classification de document
pipeline:
  type: "document_classification"
  min_confidence: 0.85
  default_max_pages: 10

  # Description du type de document à valider
  label_descriptions:
    cv: |
      Curriculum vitae (CV) d'un candidat. Vérifie les critères suivants :
      - Nom complet du candidat indiqué
      - Coordonnées présentes (email et/ou téléphone)
      - Au moins une expérience professionnelle avec dates et description
      - Formation académique indiquée (établissement et diplôme)
      - Compétences ou aptitudes listées
      Le document est valide UNIQUEMENT si tous les critères ci-dessus
      sont présents et explicites dans le document. Ne jamais inférer une valeur absente.
      Justifie critère par critère en citant ce qui a été trouvé et ce qui est absent.

    lettre_motivation: |
      Lettre de motivation accompagnant une candidature. Vérifie les critères suivants :
      - Nom complet du candidat indiqué
      - Poste ou domaine visé mentionné explicitement
      - Motivation ou intérêt pour le poste exprimé
      - Référence à une ou plusieurs expériences ou compétences pertinentes
      - Formule de salutation et de clôture présentes
      - Signature présente (manuscrite ou électronique)
      Le document est valide UNIQUEMENT si tous les critères ci-dessus
      sont présents et explicites dans le document. Ne jamais inférer une valeur absente.
      Justifie critère par critère en citant ce qui a été trouvé et ce qui est absent.

  meta_schema:
    expected_type:
      type: str
      required: true
      nullable: false
      allowed:
        - cv
        - lettre_motivation

# ================================================================
# Métadonnées du projet
# ================================================================
project_meta:
  description: "Validation de documents de candidature (CV et lettre de motivation)"
  environment: { value_key: "ENV" }
